<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.6" stop-color="#131c34"/>
      <stop offset="1" stop-color="#0d3b30"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.1" r="0.8">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- genuine app icon -->
  <defs>
    <clipPath id="iconRound"><rect x="96" y="150" width="150" height="150" rx="34"/></clipPath>
  </defs>
  <image href="icon.png" xlink:href="icon.png" x="96" y="150" width="150" height="150" clip-path="url(#iconRound)"/>
  <text x="280" y="250" font-family="Sora, sans-serif" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-3">Tsamaya</text>
  <text x="282" y="312" font-family="Sora, sans-serif" font-size="40" font-weight="700" fill="#34D399">Go well.</text>
  <text x="96" y="430" font-family="Inter, sans-serif" font-size="40" fill="#c6d0ec">Driving routes that think about <tspan fill="#ffffff" font-weight="600">risk</tspan>, not just speed —</text>
  <text x="96" y="486" font-family="Inter, sans-serif" font-size="40" fill="#c6d0ec">for South African metros.</text>
  <text x="96" y="566" font-family="Inter, sans-serif" font-size="26" fill="#8c97bd">Lower-risk routes · Johannesburg · Pretoria · Cape Town · East Rand · Secunda</text>
</svg>
